services:
  backend:
    build: .
    container_name: animetracker-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/animetracker?schema=public
      PORT: 3000
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:5173
      JIKAN_BASE_URL: https://api.jikan.moe/v4
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: animetracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: animetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d animetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: animetracker-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
